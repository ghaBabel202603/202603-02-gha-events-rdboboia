name: 02 - Eventos
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    # Agendado para ejecutarse una única vez el día 02 de marzo de 2026 a las 18:05 UTC
    cron: '5 18 2 3 *'

jobs:
  echo:
    runs-on: ubuntu-latest
    steps:
      - name: ShowTrigger
        run: |
          echo "Evento: ${{ github.event_name }}"